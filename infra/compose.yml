services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: road_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d road_network"]
      interval: 5s
      timeout: 3s
      retries: 15
    ports:
      - "5432:5432"

  backend:
    build:
      context: ../backend
    env_file:
    - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/road_network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

  smoke-ui:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_UPSTREAM: http://backend:8000
    ports:
      - "8088:80"
    volumes:
      - ../isolated/smoke-suite/ui:/usr/share/nginx/html:ro
      - ../isolated/smoke-suite/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro

  smoke-cli:
    image: python:3.12-alpine
    profiles: ["smoke"]
    depends_on:
      backend:
        condition: service_healthy
    working_dir: /suite
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ../isolated/smoke-suite:/suite:ro
    command: ["python", "scripts/smoke_api.py", "--base-url", "http://backend:8000"]
